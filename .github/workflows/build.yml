name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - config.yml
      - generate.py
      - layers/**
      - templates/**
  pull_request:
    paths:
      - config.yml
      - generate.py
      - layers/**
      - templates/**
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      base-matrix:  ${{ steps.targets.outputs.base }}
      stack-matrix: ${{ steps.targets.outputs.stacks }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Generate Dockerfiles
        run: uv run python generate.py --all --write

      - name: Build target matrices
        id: targets
        run: |
          # Third column is "-" for root images, a target name for dependents.
          base=$(uv run python generate.py --tags \
            | awk '$3=="-" {print $1}' \
            | jq -Rnc '[inputs]')
          stacks=$(uv run python generate.py --tags \
            | awk '$3!="-" {print $1}' \
            | jq -Rnc '[inputs]')
          echo "base=$base"   >> "$GITHUB_OUTPUT"
          echo "stacks=$stacks" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dockerfiles
          path: output/

  build-base:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.generate.outputs.base-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dockerfiles
          path: output/

      - uses: astral-sh/setup-uv@v5

      - name: Resolve image tag
        id: tag
        run: |
          tag=$(uv run python generate.py --tags \
            | awk -v t="${{ matrix.target }}" '$1==t {print $2}')
          echo "image=${{ env.REGISTRY }}/${{ env.OWNER }}/${tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: output/${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tag.outputs.image }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  build-stacks:
    needs: [generate, build-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.generate.outputs.stack-matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dockerfiles
          path: output/

      - uses: astral-sh/setup-uv@v5

      - name: Resolve image tag
        id: tag
        run: |
          tag=$(uv run python generate.py --tags \
            | awk -v t="${{ matrix.target }}" '$1==t {print $2}')
          echo "image=${{ env.REGISTRY }}/${{ env.OWNER }}/${tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve base build-context
        id: base
        run: |
          base_target=$(uv run python generate.py --tags \
            | awk -v t="${{ matrix.target }}" '$1==t {print $3}')
          base_local=$(uv run python generate.py --tags \
            | awk -v t="$base_target" '$1==t {print $2}')
          echo "build_context=${base_local}=docker-image://${{ env.REGISTRY }}/${{ env.OWNER }}/${base_local}" \
            >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: output/${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tag.outputs.image }}
          build-contexts: ${{ steps.base.outputs.build_context }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
