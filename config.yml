# config.yml
#
# Three orthogonal axes compose into Dockerfiles:
#
#   distro   (jazzy|humble)  -> ROS distro + its Ubuntu/CUDA pairing
#   hardware (cpu|gpu)        -> base image family + GPU-only layers
#   stack    (ros2-desktop|px4-sitl) -> the ordered layer recipe
#
# The base image is a function of BOTH distro and hardware:
#   cpu -> ubuntu:<ubuntu_version>
#   gpu -> nvidia/cuda:<cuda_version>-runtime-ubuntu<ubuntu_version>
# CUDA versions are NOT symmetric across Ubuntu releases: Noble (24.04) needs
# CUDA >= 12.5, so cuda_version lives on the distro axis. 12.6.3 covers both.
#
# A `target` is an explicit (stack, distro, hardware) triple, so you only build
# the combinations you actually want -- not the full cartesian product.

# --- Axis 1: ROS distro -> Ubuntu / CUDA pairing --------------------------
distros:
  jazzy:
    ros_distro: jazzy
    ubuntu_codename: noble
    ubuntu_version: "24.04"
    cuda_version: "12.6.3"
  humble:
    ros_distro: humble
    ubuntu_codename: jammy
    ubuntu_version: "22.04"
    cuda_version: "12.6.3"

# --- Axis 2: hardware -> base image template + extra layers ----------------
# `base` is itself a Jinja string rendered with the merged context.
# `layers` are GPU/CPU-only layers inserted right after the header.
hardware:
  cpu:
    base: "ubuntu:{{ ubuntu_version }}"
    layers: []
  gpu:
    base: "nvidia/cuda:{{ cuda_version }}-runtime-ubuntu{{ ubuntu_version }}"
    layers:
      - nvidia-env
  # Like gpu, but on the CUDA -devel base: ships nvcc + headers for compiling
  # CUDA code (kernels, custom ops). Larger image; use only when you build CUDA.
  gpu-devel:
    base: "nvidia/cuda:{{ cuda_version }}-devel-ubuntu{{ ubuntu_version }}"
    layers:
      - nvidia-env

# --- Axis 3: stack -> ordered layer recipe --------------------------------
# A stack may set `base_stack: <other-stack>` to build FROM that stack's image
# (for the SAME distro+hardware) instead of a raw OS/CUDA base. When it does,
# its `layers` list holds ONLY the delta on top of the base, and the base's
# hardware layers (e.g. nvidia-env) are inherited rather than repeated.
# Chaining is one level deep: a base_stack must itself be a plain (no base_stack)
# stack, and must be listed as a target for every distro+hardware its children use.
stacks:
  # Shared ROS 2 core: repo + desktop + build tools + rosdep. Stays root (no
  # USER switch) so children can still apt-get install. Both ros2-desktop and
  # px4-sitl build FROM this instead of repeating the core four layers.
  ros2-base:
    description: "ROS 2 {{ ros_distro }} core ({{ hardware }}): desktop + build tools."
    layers:
      - bootstrap
      - ros2-repo
      - ros2-desktop
      - rosdep-init
  ros2-desktop:
    description: "ROS 2 {{ ros_distro }} desktop ({{ hardware }}), fzf + oh-my-zsh."
    base_stack: ros2-base
    layers:
      - clangd
      - ruff
      - fzf-shell
      - ros-user
      - omz-shell
  px4-sitl:
    description: "ROS 2 {{ ros_distro }} + PX4 SITL toolchain + MAVSDK ({{ hardware }})."
    base_stack: ros2-base
    layers:
      - px4-deps
      - mavsdk-python
      - gz-sim
      - ros-user
      - px4-source
      - omz-shell

# Template args shared by every target.
defaults:
  username: ros

# --- Targets: the (stack, distro, hardware) triples to generate -----------
# ros2-base images must be listed for every distro+hardware their children use;
# build.sh builds them first. px4-sitl images on every hardware pull in the
# gz-sim (Gazebo) layer: GPU images render with the host driver, CPU images fall
# back to Mesa llvmpipe software rendering. Add/remove freely.
targets:
  # Shared base images -- built first, children FROM these.
  - { stack: ros2-base,    distro: jazzy,  hardware: cpu }
  - { stack: ros2-base,    distro: jazzy,  hardware: gpu }
  - { stack: ros2-base,    distro: jazzy,  hardware: gpu-devel }
  - { stack: ros2-base,    distro: humble, hardware: cpu }
  - { stack: ros2-base,    distro: humble, hardware: gpu }
  # ROS 2 desktop on every distro x hardware cell.
  - { stack: ros2-desktop, distro: jazzy,  hardware: cpu }
  - { stack: ros2-desktop, distro: jazzy,  hardware: gpu }
  - { stack: ros2-desktop, distro: jazzy,  hardware: gpu-devel }
  - { stack: ros2-desktop, distro: humble, hardware: cpu }
  - { stack: ros2-desktop, distro: humble, hardware: gpu }
  # PX4 SITL: CPU (llvmpipe software sim) + GPU (hardware-accelerated Gazebo).
  - { stack: px4-sitl,     distro: jazzy,  hardware: cpu }
  - { stack: px4-sitl,     distro: jazzy,  hardware: gpu }
  - { stack: px4-sitl,     distro: jazzy,  hardware: gpu-devel }
  - { stack: px4-sitl,     distro: humble, hardware: cpu }
  - { stack: px4-sitl,     distro: humble, hardware: gpu }
